services:
  - type: web
    name: natgas-tracker
    runtime: python
    pythonVersion: "3.11.9"
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: natgas-db
          property: connectionString
      - key: SENDGRID_API_KEY
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: EMAIL_FROM
        sync: false

databases:
  - name: natgas-db
    plan: free
    region: oregon
