services:
  - type: web
    name: natgas-tracker
    runtime: docker
    region: oregon
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: natgas-db
          property: connectionString
      - key: SENDGRID_API_KEY
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: EMAIL_FROM
        sync: false

databases:
  - name: natgas-db
    plan: free
    region: oregon
